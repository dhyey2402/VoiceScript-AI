services:
  - type: web
    name: speech-to-text-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: speech-to-text-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /

databases:
  - name: speech-to-text-db
    databaseName: speech_to_text
    plan: free
